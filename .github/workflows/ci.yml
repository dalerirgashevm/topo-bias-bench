name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Basic import check
        run: |
          python - <<'PY'
          import sys
          sys.path.append('src')
          import data, topology, models, train, eval, run_experiments
          print('imports ok')
          PY
